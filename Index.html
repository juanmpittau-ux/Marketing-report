<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>MBF Marketing Dashboard</title><script src="https://cdn.jsdelivr.net/npm/chart.js"></script><script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script><style>:root{--bg:#0a0d12;--card:#121821;--line:#1f2935;--acc:#00a3e0;--txt:#eef3f8}body{margin:0;background:var(--bg);color:var(--txt);font-family:Segoe UI}aside{position:fixed;width:240px;top:0;bottom:0;background:var(--card);padding:20px}main{margin-left:260px;padding:20px}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:15px}.kpi,.card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:15px}.kpi h3{margin:0;color:#9aa}.kpi div{font-size:30px;font-weight:700}.card canvas{max-height:350px}.hero{display:grid;grid-template-columns:repeat(2,1fr);gap:15px;margin-top:15px}select,input{padding:8px;background:#0f141c;color:white;border:1px solid #333}</style></head><body><aside><h2>Marketing Report</h2><p>MBF 2026</p><input type=file id=file accept=.xlsx><hr><div>Executive</div><div>Trucks</div><div>Buses</div><div>Competencia</div></aside><main><h1>Executive Dashboard</h1><div class=grid><div class=kpi><h3>MBF PR CV</h3><div id=k1>-</div></div><div class=kpi><h3>Registraciones</h3><div id=k2>-</div></div><div class=kpi><h3>Acquisitions</h3><div id=k3>-</div></div><div class=kpi><h3>Marcas</h3><div id=k4>-</div></div></div><div class=hero><div class=card><h3>Top Marcas</h3><canvas id=c1></canvas></div><div class=card><h3>Tipo Acreedor</h3><canvas id=c2></canvas></div></div><div class=hero><div class=card><h3>Meses</h3><canvas id=c3></canvas></div><div class=card><h3>Vehículos</h3><canvas id=c4></canvas></div></div></main><script>document.getElementById('file').onchange=e=>{const r=new FileReader();r.onload=x=>{const wb=XLSX.read(x.target.result,{type:'array'});const p=XLSX.utils.sheet_to_json(wb.Sheets['Prendas Proc']);document.getElementById('k2').innerText=p.length;document.getElementById('k4').innerText=[...new Set(p.map(v=>v['Marca procesada']))].length;const suma=p.reduce((a,b)=>a+(+b.Monto||0),0);document.getElementById('k3').innerText=(suma/1e6).toFixed(0)+' M';const marcas={};p.forEach(v=>marcas[v['Marca procesada']]=(marcas[v['Marca procesada']]||0)+1);const top=Object.entries(marcas).sort((a,b)=>b[1]-a[1]).slice(0,10);new Chart(c1,{type:'bar',data:{labels:top.map(x=>x[0]),datasets:[{data:top.map(x=>x[1]),backgroundColor:'#00a3e0'}]}});const acre={};p.forEach(v=>acre[v['tipo de acreedor']]=(acre[v['tipo de acreedor']||'N/A']||0)+1);new Chart(c2,{type:'doughnut',data:{labels:Object.keys(acre),datasets:[{data:Object.values(acre)}]}});const mes={};p.forEach(v=>mes[v.Mes]=(mes[v.Mes]||0)+1);new Chart(c3,{type:'line',data:{labels:Object.keys(mes),datasets:[{data:Object.values(mes),borderColor:'#00a3e0'}]}});const tv={};p.forEach(v=>tv[v['tipo vehiculo']]=(tv[v['tipo vehiculo']]||0)+1);new Chart(c4,{type:'pie',data:{labels:Object.keys(tv),datasets:[{data:Object.values(tv)}]}});document.getElementById('k1').innerText=((p.filter(x=>x['Marca procesada']==='MERCEDES BENZ').length/p.length)*100).toFixed(2)+'%';};r.readAsArrayBuffer(e.target.files[0]);}</script></body></html>
