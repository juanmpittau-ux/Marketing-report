<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Marketing Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    background:#f5f7fa;
}

.kpi{
    border-radius:16px;
    padding:20px;
    background:white;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
    text-align:center;
}

.kpi h2{
    font-weight:bold;
}

canvas{
    background:white;
    border-radius:16px;
    padding:15px;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
}
</style>

</head>

<body>

<div class="container-fluid p-4">

<h1 class="mb-4">
📊 Marketing Finance Dashboard
</h1>

<div class="row mb-4">

<div class="col-md-3">
<div class="kpi">
<h6>Operaciones</h6>
<h2>12.540</h2>
</div>
</div>

<div class="col-md-3">
<div class="kpi">
<h6>Monto Total</h6>
<h2>$845M</h2>
</div>
</div>

<div class="col-md-3">
<div class="kpi">
<h6>Ticket Promedio</h6>
<h2>$67K</h2>
</div>
</div>

<div class="col-md-3">
<div class="kpi">
<h6>Marcas</h6>
<h2>28</h2>
</div>
</div>

</div>

<div class="row">

<div class="col-lg-8 mb-4">
<canvas id="ventas"></canvas>
</div>

<div class="col-lg-4 mb-4">
<canvas id="acreedores"></canvas>
</div>

</div>

<div class="row">

<div class="col-lg-6 mb-4">
<canvas id="marcas"></canvas>
</div>

<div class="col-lg-6 mb-4">
<canvas id="zonas"></canvas>
</div>

</div>

</div>

<script>

new Chart(
document.getElementById('ventas'),
{
type:'line',
data:{
labels:['Ene','Feb','Mar','Abr','May','Jun','Jul'],
datasets:[{
label:'Monto financiado',
data:[120,180,240,300,280,420,520],
borderWidth:3
}]
}
}
);

new Chart(
document.getElementById('acreedores'),
{
type:'doughnut',
data:{
labels:['Banco','Cautiva','Dealer','Plan'],
datasets:[{
data:[35,30,10,25]
}]
}
}
);

new Chart(
document.getElementById('marcas'),
{
type:'bar',
data:{
labels:['VW','Toyota','Fiat','Mercedes','Chevrolet'],
datasets:[{
label:'Operaciones',
data:[650,620,540,430,390]
}]
}
}
);

new Chart(
document.getElementById('zonas'),
{
type:'bar',
data:{
labels:['Buenos Aires','Mediterráneo','Mesopotamia'],
datasets:[{
label:'Monto',
data:[420,300,180]
}]
}
}
);

</script>

</body>
</html>
