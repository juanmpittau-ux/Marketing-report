<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MBF Dashboard</title>

<script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    margin:0;
    background:#0f172a;
    color:white;
    font-family:Segoe UI,sans-serif;
}
.header{
    padding:20px;
    background:#111827;
}
.container{
    padding:20px;
}
.kpis{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:15px;
}
.card{
    background:#1e293b;
    border-radius:12px;
    padding:20px;
}
.card h3{
    margin:0;
    font-size:13px;
    color:#94a3b8;
}
.card h1{
    margin:10px 0 0;
}
.grid{
    margin-top:20px;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}
.chart-box{
    background:#1e293b;
    border-radius:12px;
    padding:20px;
}
@media(max-width:900px){
.grid{
grid-template-columns:1fr;
}
}
</style>
</head>

<body>

<div class="header">
<h1>Mercedes-Benz Financial Services</h1>
<p>Camiones · Buses · Leasing · Competencia</p>
</div>

<div class="container">

<div class="kpis">

<div class="card">
<h3>Registraciones Trucks MB</h3>
<h1 id="regMB">-</h1>
</div>

<div class="card">
<h3>Share Trucks MB</h3>
<h1 id="shareMB">-</h1>
</div>

<div class="card">
<h3>Operaciones Leasing</h3>
<h1 id="leaseOps">-</h1>
</div>

<div class="card">
<h3>Penetración Leasing</h3>
<h1 id="leasePen">-</h1>
</div>

</div>

<div class="grid">

<div class="chart-box">
<h3>Competencia Camiones</h3>
<canvas id="trucksChart"></canvas>
</div>

<div class="chart-box">
<h3>Leasing MBF</h3>
<canvas id="leasingChart"></canvas>
</div>

</div>

</div>

<script>

async function loadDashboard(){

const response = await fetch(
"Base de datos Mkt report Power Bi 2026.xlsx"
);

const data = await response.arrayBuffer();

const workbook = XLSX.read(data);

const trucks =
XLSX.utils.sheet_to_json(
workbook.Sheets["Trucks MB"]
);

const leasing =
XLSX.utils.sheet_to_json(
workbook.Sheets["Lease2022"]
);

const mb =
trucks.find(
x => String(x["Marca"])
.toUpperCase()
.includes("MERCEDES")
);

const registraciones =
mb["Sales YTD"] || 0;

const share =
(Number(
mb["Share YTD"]
) * 100).toFixed(1);

const operacionesLeasing =
leasing.length;

const penetracion =
(
operacionesLeasing /
registraciones
* 100
).toFixed(1);

document.getElementById("regMB")
.innerText =
registraciones.toLocaleString("es-AR");

document.getElementById("shareMB")
.innerText =
share + "%";

document.getElementById("leaseOps")
.innerText =
operacionesLeasing.toLocaleString("es-AR");

document.getElementById("leasePen")
.innerText =
penetracion + "%";

new Chart(
document.getElementById("trucksChart"),
{
type:"bar",
data:{
labels:
trucks
.slice(0,10)
.map(x=>x["Marca"]),
datasets:[{
label:"Registraciones YTD",
data:
trucks
.slice(0,10)
.map(x=>x["Sales YTD"]),
backgroundColor:"#00A3E0"
}]
}
}
);

const tipos = {};

leasing.forEach(r=>{

const tipo =
r["TIPO ACREEDOR"] || "Sin dato";

tipos[tipo] =
(tipos[tipo] || 0) + 1;

});

new Chart(
document.getElementById("leasingChart"),
{
type:"doughnut",
data:{
labels:Object.keys(tipos),
datasets:[{
data:Object.values(tipos)
}]
}
}
);

}

loadDashboard();

</script>

</body>
</html>
