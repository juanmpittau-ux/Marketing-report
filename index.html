<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Marketing Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>

<style>

body{
    background:#f4f6f9;
    font-family:Segoe UI,Arial,sans-serif;
}

.header{
    background:#0f172a;
    color:white;
    padding:20px;
}

.kpi{
    background:white;
    border-radius:15px;
    padding:20px;
    text-align:center;
    box-shadow:0 2px 10px rgba(0,0,0,.08);
}

.kpi h2{
    font-weight:700;
    margin-top:10px;
}

.chart-box{
    background:white;
    border-radius:15px;
    padding:20px;
    box-shadow:0 2px 10px rgba(0,0,0,.08);
}

canvas{
    max-height:400px;
}

</style>

</head>

<body>

<div class="header">
<h2>📊 Marketing Finance Dashboard</h2>
</div>

<div class="container-fluid mt-4">

<div class="row g-3 mb-4">

<div class="col-md-3">
<div class="kpi">
<div>Operaciones</div>
<h2 id="ops">0</h2>
</div>
</div>

<div class="col-md-3">
<div class="kpi">
<div>Monto Total</div>
<h2 id="monto">$0</h2>
</div>
</div>

<div class="col-md-3">
<div class="kpi">
<div>Ticket Promedio</div>
<h2 id="ticket">$0</h2>
</div>
</div>

<div class="col-md-3">
<div class="kpi">
<div>Marcas</div>
<h2 id="marcas">0</h2>
</div>
</div>

</div>

<div class="row">

<div class="col-lg-8 mb-4">
<div class="chart-box">
<h5>Evolución por Mes</h5>
<canvas id="mesChart"></canvas>
</div>
</div>

<div class="col-lg-4 mb-4">
<div class="chart-box">
<h5>Tipo de Acreedor</h5>
<canvas id="acreedorChart"></canvas>
</div>
</div>

</div>

<div class="row">

<div class="col-lg-12">
<div class="chart-box">
<h5>Top Marcas</h5>
<canvas id="marcaChart"></canvas>
</div>
</div>

</div>

</div>

<script>

async function cargarExcel(){

try{

const response = await fetch(
"Base de datos Mkt report Power Bi 2026.xlsx"
);

const data = await response.arrayBuffer();

const workbook = XLSX.read(data);

const sheet = workbook.Sheets["Prendas Proc"];

const rows = XLSX.utils.sheet_to_json(sheet);

document.getElementById("ops").innerText =
rows.length.toLocaleString("es-AR");

let montoTotal = 0;

rows.forEach(r=>{
montoTotal += Number(r["Monto"]) || 0;
});

document.getElementById("monto").innerText =
"$ " +
Math.round(montoTotal/1000000)
.toLocaleString("es-AR")
+
"M";

document.getElementById("ticket").innerText =
"$ " +
Math.round(montoTotal/rows.length)
.toLocaleString("es-AR");

const marcas = new Set();

rows.forEach(r=>{
if(r["Marca"]){
marcas.add(r["Marca"]);
}
});

document.getElementById("marcas").innerText =
marcas.size;

const meses = {};

rows.forEach(r=>{
const mes = r["Mes"];

if(!meses[mes]){
meses[mes]=0;
}

meses[mes]++;
});

new Chart(
document.getElementById("mesChart"),
{
type:"line",
data:{
labels:Object.keys(meses),
datasets:[{
label:"Operaciones",
data:Object.values(meses),
borderWidth:3,
fill:false
}]
}
}
);

const acreedores = {};

rows.forEach(r=>{

const tipo = r["tipo de acreedor"];

if(!acreedores[tipo]){
acreedores[tipo] = 0;
}

acreedores[tipo]++;

});

new Chart(
document.getElementById("acreedorChart"),
{
type:"doughnut",
data:{
labels:Object.keys(acreedores),
datasets:[{
data:Object.values(acreedores)
}]
}
}
);

const topMarca = {};

rows.forEach(r=>{

const marca = r["Marca"];

if(!topMarca[marca]){
topMarca[marca]=0;
}

topMarca[marca]++;

});

const ranking = Object.entries(topMarca)
.sort((a,b)=>b[1]-a[1])
.slice(0,10);

new Chart(
document.getElementById("marcaChart"),
{
type:"bar",
data:{
labels:ranking.map(x=>x[0]),
datasets:[{
label:"Operaciones",
data:ranking.map(x=>x[1])
}]
}
}
);

}
catch(error){

console.error(error);

alert(
"No se pudo leer el Excel. Verificá que el archivo esté en la misma carpeta que index.html"
);

}

}

cargarExcel();

</script>

</body>

</html>
